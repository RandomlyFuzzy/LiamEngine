name: Build and Release (Java 8)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant

      - name: Build with Ant
        working-directory: Engine
        run: ant clean jar

      - name: Show build output (debug)
        run: |
          echo "JAR files:" 
          find Engine -type f -name "*.jar" -print || true
          echo "Build/classes tree:" 
          ls -R Engine/build || true


      - name: Get JAR path
        id: jar
        run: |
          file=$(find Engine -type f -name "*.jar" | head -n 1)
          echo "Found jar: $file"
          echo "file=$file" >> $GITHUB_OUTPUT

      - name: Fail if JAR not found
        run: |
          if [ -z "${{ steps.jar.outputs.file }}" ]; then
            echo "No JAR found after build!"
            exit 1
          fi

      - name: Validate JAR contains critical classes
        if: ${{ steps.jar.outputs.file != '' }}
        run: |
          jarfile=${{ steps.jar.outputs.file }}
          echo "Inspecting $jarfile"
          jar tf "$jarfile" > /tmp/jar_contents.txt
          grep -E "com/Liamengine/Engine/AbstractClasses/ILevel.class" /tmp/jar_contents.txt || {
            echo "ERROR: ILevel.class not present in jar. Aborting release.";
            echo "Jar content:"; head -n 200 /tmp/jar_contents.txt || true
            exit 1;
          }
          echo "ILevel.class found."

      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.jar.outputs.file }}