name: Build and Release (Java 8)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant

      - name: Build with Ant
        working-directory: Engine
        run: ant jar

      - name: Show build output (debug)
        run: find Engine -type f -name "*.jar" -print

      - name: Get JAR path
        id: jar
        run: |
          file=$(find Engine -type f -name "*.jar" | head -n 1)
          echo "Found jar: $file"
          echo "file=$file" >> $GITHUB_OUTPUT

      - name: Fail if JAR not found
        run: |
          if [ -z "${{ steps.jar.outputs.file }}" ]; then
            echo "No JAR found after build!"
            exit 1
          fi

      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.jar.outputs.file }}