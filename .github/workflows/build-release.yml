name: Build and Release (Java 1.8.0_201)

on:
  push:
    branches: [ main ]
    tags: ['v*.*.*']
  pull_request:
    branches: [ main ]
  
permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8.0.492+9'
          distribution: temurin
          java-package: jdk
          check-latest: false
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}
          overwrite-settings: true
          job-status: success
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant

      - name: Build jar with Ant
        working-directory: Engine
        run: ant jar

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiamEngine-jar
          path: Engine/dist/*.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8.0.492+9'
          distribution: temurin
          java-package: jdk
          check-latest: false
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}
          overwrite-settings: true
          job-status: success
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: LiamEngine-jar
          path: Engine/dist

      - name: Create GitHub Release for tag
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset for tag
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Engine/dist/LiamEngine.jar
          asset_name: LiamEngine.jar
          asset_content_type: application/java-archive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update "latest" release and upload JAR
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: latest
          draft: false
          prerelease: false
          files: Engine/dist/LiamEngine.jar
          token: ${{ secrets.GITHUB_TOKEN }}
