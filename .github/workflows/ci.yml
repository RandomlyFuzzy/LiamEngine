name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download JUnit dependencies
        working-directory: Engine
        run: |
          mkdir -p lib
          wget -q -O lib/junit-4.13.2.jar \
            https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
          wget -q -O lib/hamcrest-core-1.3.jar \
            https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar

      - name: Compile main sources
        working-directory: Engine
        run: |
          mkdir -p build/classes
          find src -name "*.java" > sources.txt
          javac -d build/classes @sources.txt

      - name: Compile test sources
        working-directory: Engine
        run: |
          mkdir -p build/test/classes
          find test -name "*.java" > test-sources.txt
          javac -d build/test/classes \
            -cp "build/classes:lib/junit-4.13.2.jar" \
            @test-sources.txt

      - name: Run tests
        working-directory: Engine
        run: |
          java -cp "build/classes:build/test/classes:lib/junit-4.13.2.jar:lib/hamcrest-core-1.3.jar" \
            org.junit.runner.JUnitCore \
            com.Liamengine.Engine.Components.VectorTest \
            com.Liamengine.Engine.Utils.CollisonUtilsTest
